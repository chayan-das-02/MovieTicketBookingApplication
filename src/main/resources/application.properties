# Application Configuration
spring.application.name=movie-ticket-booking-system
spring.profiles.active=dev

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration - SQLite
spring.datasource.url=jdbc:sqlite:movieticketdb.db
spring.datasource.driverClassName=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# Uncomment for MySQL configuration (Production)
# spring.datasource.url=jdbc:mysql://localhost:3306/movieticketdb
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JPA/Hibernate Configuration
# Let Hibernate auto-detect the dialect from the JDBC driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# SQLite Database File Location
spring.datasource.initialization-mode=always

# Logging Configuration
logging.level.root=INFO
logging.level.com.movieticket=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Jackson Configuration
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false

# Validation
spring.validation.enabled=true

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - MovieTickets</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 1rem;
        }

        .dashboard-header h1 {
            color: var(--secondary-color);
        }

        .user-info {
            text-align: right;
        }

        .user-info p {
            margin: 0.25rem 0;
        }

        .logout-btn {
            background-color: var(--primary-color);
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .logout-btn:hover {
            background-color: #ff5252;
        }

        .shows-container {
            background-color: white;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .shows-container h2 {
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
        }

        .show-booking-card {
            padding: 1.5rem;
            border-left: 4px solid var(--secondary-color);
            background-color: #f9f9f9;
            margin-bottom: 1.5rem;
            border-radius: 5px;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 2rem;
            align-items: center;
        }

        .show-details h3 {
            color: var(--dark-color);
            margin-bottom: 0.5rem;
        }

        .show-details p {
            margin: 0.25rem 0;
            color: #666;
            font-size: 0.9rem;
        }

        .show-pricing {
            text-align: center;
        }

        .show-pricing .price {
            font-size: 2rem;
            font-weight: bold;
            color: var(--success-color);
        }

        .show-pricing .seats {
            color: #666;
            margin-top: 0.5rem;
        }

        .show-action {
            text-align: center;
        }

        .btn-book {
            background-color: var(--secondary-color);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-book:hover {
            background-color: #3db8b0;
            transform: translateY(-2px);
        }

        .btn-book:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .not-authenticated {
            text-align: center;
            padding: 3rem;
            background-color: #f3e5f5;
            border-radius: 10px;
            color: var(--dark-color);
        }

        .not-authenticated a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #999;
        }

        .message {
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
        }

        .message.error {
            background-color: #ffebee;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            display: block;
        }

        .message.success {
            background-color: #e8f5e9;
            color: var(--success-color);
            border: 1px solid var(--success-color);
            display: block;
        }

        @media (max-width: 768px) {
            .show-booking-card {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .show-pricing,
            .show-action {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">🎬 MovieTickets</div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="admin-dashboard.html" class="nav-link">Admin</a></li>
                <li><a href="user-dashboard.html" class="nav-link active">User</a></li>
                <li><a href="user-bookings.html" class="nav-link">My Bookings</a></li>
            </ul>
        </div>
    </nav>

    <div id="notAuthenticated" class="not-authenticated" style="display: none;">
        <h2>⛔ Access Denied</h2>
        <p>You need to be logged in to access this page.</p>
        <a href="login.html">Go to Login</a>
    </div>

    <div id="dashboardContent" class="dashboard-container" style="display: none;">
        <div class="dashboard-header">
            <h1>🎫 My Dashboard</h1>
            <div class="user-info">
                <p>Welcome, <strong id="userName"></strong></p>
                <p>Email: <strong id="userEmail"></strong></p>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="shows-container">
            <h2>🎬 Available Shows</h2>
            <div id="bookingMessage" class="message"></div>
            <div id="showsContainer">
                <p class="empty-state">Loading shows...</p>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        // Check authentication
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));

            if (!user) {
                document.getElementById('notAuthenticated').style.display = 'block';
                document.getElementById('dashboardContent').style.display = 'none';
                return;
            }

            document.getElementById('notAuthenticated').style.display = 'none';
            document.getElementById('dashboardContent').style.display = 'block';
            document.getElementById('userName').textContent = user.firstName + ' ' + user.lastName;
            document.getElementById('userEmail').textContent = user.email;

            // Load shows
            loadShows();
        });

        async function loadShows() {
            try {
                const [shows, movies, screens] = await Promise.all([
                    API.getShows(),
                    API.getMovies(),
                    API.getScreens()
                ]);

                const container = document.getElementById('showsContainer');

                if (shows.length === 0) {
                    container.innerHTML = '<p class="empty-state">No shows available at the moment</p>';
                    return;
                }

                // Sort by start time
                shows.sort((a, b) => new Date(a.startTime) - new Date(b.startTime));

                container.innerHTML = '';
                shows.forEach(show => {
                    const movie = movies.find(m => m.movieId === show.movieId);
                    const screen = screens.find(s => s.screenId === show.screenId);

                    const startDate = new Date(show.startTime);
                    const formattedDate = startDate.toLocaleDateString('en-US', {
                        weekday: 'short',
                        month: 'short',
                        day: 'numeric'
                    });
                    const formattedTime = startDate.toLocaleTimeString('en-US', {
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    const isAvailable = show.totalSeatsAvailable > 0;
                    const isScreening = show.status === 'RUNNING';
                    const canBook = isAvailable && isScreening;

                    // Status styling
                    let statusBadge = '';
                    let statusStyle = '';
                    if (show.status === 'RUNNING') {
                        statusBadge = '🎬 Screening';
                        statusStyle = 'color: green; font-weight: bold;';
                    } else if (show.status === 'UPCOMING') {
                        statusBadge = '⏱️ Upcoming';
                        statusStyle = 'color: orange; font-weight: bold;';
                    } else if (show.status === 'COMPLETED') {
                        statusBadge = '✓ Completed';
                        statusStyle = 'color: gray; font-weight: bold;';
                    } else {
                        statusBadge = show.status;
                    }

                    const showCard = `
                        <div class="show-booking-card">
                            <div class="show-details">
                                <h3>${movie?.title || 'Unknown'}</h3>
                                <p><strong>📅 Date:</strong> ${formattedDate}</p>
                                <p><strong>🕐 Time:</strong> ${formattedTime}</p>
                                <p><strong>🎬 Screen:</strong> ${screen?.screenName || 'Unknown'}</p>
                                <p><strong>Description:</strong> ${movie?.description.substring(0, 100)}...</p>
                            </div>
                            <div class="show-pricing">
                                <div class="price">₹${show.ticketPrice}</div>
                                <div class="seats">${show.totalSeatsAvailable} seats available</div>
                                <p style="${statusStyle}">${statusBadge}</p>
                            </div>
                            <div class="show-action">
                                <button class="btn-book" 
                                    ${!canBook ? 'disabled' : ''} 
                                    title="${!isScreening ? 'Cannot book - Show is ' + show.status : (!isAvailable ? 'No seats available' : 'Click to book')}"
                                    onclick="bookShow(${show.showId}, '${movie?.title}', ${show.ticketPrice}, this)">
                                    ${canBook ? '🎫 Book Now' : (!isScreening ? 'Not Available' : 'Sold Out')}
                                </button>
                            </div>
                        </div>
                    `;
                    container.innerHTML += showCard;
                });
            } catch (error) {
                console.error('Error loading shows:', error);
                document.getElementById('showsContainer').innerHTML = 
                    '<p class="empty-state error">Error loading shows</p>';
            }
        }

        async function bookShow(showId, movieTitle, ticketPrice, buttonElement) {
            const user = JSON.parse(localStorage.getItem('user'));
            const bookingMessage = document.getElementById('bookingMessage');

            if (!user) {
                alert('Please log in to book tickets');
                window.location.href = 'login.html';
                return;
            }

            const confirmBooking = confirm(`Book a ticket for "${movieTitle}" at ₹${ticketPrice}?`);

            if (confirmBooking) {
                // Disable button while processing
                if (buttonElement) {
                    buttonElement.disabled = true;
                }

                try {
                    // Get available seats for this show
                    const seatsResponse = await fetch(`/api/v1/seats/show/${showId}/available`);
                    
                    if (!seatsResponse.ok) {
                        throw new Error(`Failed to fetch available seats: ${seatsResponse.status} ${seatsResponse.statusText}`);
                    }
                    
                    const availableSeats = await seatsResponse.json();
                    
                    if (!availableSeats || availableSeats.length === 0) {
                        throw new Error('No available seats for this show');
                    }

                    // Use the first available seat
                    const seatId = availableSeats[0].seatId;

                    const bookingRequest = {
                        showId: showId,
                        seatIds: [seatId]
                    };

                    const response = await fetch(`/api/v1/bookings/users/${user.userId}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(bookingRequest)
                    });

                    if (!response.ok) {
                        let errorMessage = `Error ${response.status}: ${response.statusText}`;
                        try {
                            const errorData = await response.json();
                            errorMessage = errorData.message || errorMessage;
                        } catch (e) {
                            // If response is not JSON, use the status text
                        }
                        throw new Error(errorMessage);
                    }

                    const data = await response.json();
                    bookingMessage.textContent = `✅ Booking confirmed! Booking Reference: ${data.bookingRef}. Total: ₹${data.totalPrice}. Check My Bookings for details.`;
                    bookingMessage.className = 'message success';
                    
                    // Reload shows after 2 seconds
                    setTimeout(() => {
                        location.reload();
                    }, 2000);
                } catch (err) {
                    console.error('Booking error:', err);
                    bookingMessage.textContent = '❌ Booking failed: ' + err.message;
                    bookingMessage.className = 'message error';
                    if (buttonElement) {
                        buttonElement.disabled = false;
                    }
                }
            }
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>

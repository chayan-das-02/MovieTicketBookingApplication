<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🎬</text></svg>">
    <title>Booking Management - Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .management-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .management-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 1rem;
        }

        .management-header h1 {
            color: var(--primary-color);
            margin: 0;
        }

        .back-button {
            background-color: var(--primary-color);
            color: white;
            padding: 0.6rem 1.2rem;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .back-button:hover {
            background-color: #ff5252;
            transform: translateY(-2px);
        }

        .filters-section {
            background-color: white;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--dark-color);
        }

        .form-group select {
            padding: 0.8rem;
            border: 2px solid var(--border-color);
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .filter-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn-filter {
            padding: 0.8rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-filter:hover {
            background-color: #ff5252;
            transform: translateY(-2px);
        }

        .btn-clear {
            padding: 0.8rem 1.5rem;
            background-color: #666;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-clear:hover {
            background-color: #555;
        }

        .list-card {
            background-color: white;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .list-card h2 {
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 1.5rem;
        }

        .bookings-table {
            width: 100%;
            border-collapse: collapse;
        }

        .bookings-table thead {
            background-color: var(--primary-color);
            color: white;
        }

        .bookings-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }

        .bookings-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .bookings-table tbody tr:hover {
            background-color: #f9f9f9;
        }

        .status-badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-confirmed {
            background-color: #e8f5e9;
            color: var(--success-color);
        }

        .status-pending {
            background-color: #fff3e0;
            color: #ff9800;
        }

        .status-cancelled {
            background-color: #ffebee;
            color: var(--primary-color);
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn-small {
            padding: 0.5rem 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .btn-confirm {
            background-color: #4caf50;
            color: white;
        }

        .btn-confirm:hover {
            background-color: #45a049;
        }

        .btn-cancel {
            background-color: #f44336;
            color: white;
        }

        .btn-cancel:hover {
            background-color: #da190b;
        }

        @media (max-width: 900px) {
            .filters-grid {
                grid-template-columns: 1fr;
            }

            .filter-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo"><a href="index.html" class="nav-link active">🎬 MovieTickets</a></div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="admin-dashboard.html" class="nav-link active">Admin</a></li>
                <li><a href="user-dashboard.html" class="nav-link">User</a></li>
            </ul>
        </div>
    </nav>

    <div id="notAuthenticated" style="display: none; max-width: 1200px; margin: 3rem auto; padding: 2rem; background-color: #ffebee; border-radius: 10px; text-align: center; color: var(--primary-color);">
        <h2>⛔ Access Denied</h2>
        <p>You need to be logged in as an admin to access this page.</p>
        <a href="login.html" style="color: var(--primary-color); font-weight: 600;">Go to Login</a>
    </div>

    <div id="managementContent" style="display: none;">
        <div class="management-container">
            <div class="management-header">
                <h1>🎫 Booking Management</h1>
                <a href="admin-dashboard.html" class="back-button">← Back to Dashboard</a>
            </div>

            <!-- Filters Section -->
            <div class="filters-section">
                <h3 style="color: var(--primary-color); margin-top: 0;">🔍 Filter Bookings</h3>
                <div class="filters-grid">
                    <div class="form-group">
                        <label for="statusFilter">Status</label>
                        <select id="statusFilter">
                            <option value="">All Statuses</option>
                            <option value="PENDING">Pending</option>
                            <option value="CONFIRMED">Confirmed</option>
                            <option value="CANCELLED">Cancelled</option>
                        </select>
                    </div>
                </div>
                <div class="filter-buttons">
                    <button class="btn-filter" onclick="filterBookings()">Apply Filter</button>
                    <button class="btn-clear" onclick="clearFilters()">Clear Filters</button>
                </div>
            </div>

            <!-- Bookings List -->
            <div class="list-card">
                <h2>🎫 All Bookings</h2>
                <div style="overflow-x: auto;">
                    <table class="bookings-table">
                        <thead>
                            <tr>
                                <th>Booking ID</th>
                                <th>User</th>
                                <th>Movie</th>
                                <th>Show Time</th>
                                <th>Seats</th>
                                <th>Total Price</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="bookingsContainer">
                            <tr><td colspan="8" style="text-align: center;">Loading bookings...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        // Check authentication
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));

            if (!user || user.role !== 'ADMIN') {
                document.getElementById('notAuthenticated').style.display = 'block';
                document.getElementById('managementContent').style.display = 'none';
                return;
            }

            document.getElementById('notAuthenticated').style.display = 'none';
            document.getElementById('managementContent').style.display = 'block';

            loadBookings();
        });

        let allBookings = [];

        async function loadBookings() {
            try {
                const response = await fetch('/api/v1/bookings');
                allBookings = await response.json();
                renderBookingsTable(allBookings);
            } catch (error) {
                console.error('Error loading bookings:', error);
                document.getElementById('bookingsContainer').innerHTML = 
                    '<tr><td colspan="8" style="text-align: center; color: red;">Error loading bookings</td></tr>';
            }
        }

        function renderBookingsTable(bookings) {
            const container = document.getElementById('bookingsContainer');
            
            if (!bookings || bookings.length === 0) {
                container.innerHTML = '<tr><td colspan="8" style="text-align: center;">No bookings found</td></tr>';
                return;
            }

            container.innerHTML = bookings.map(booking => `
                <tr>
                    <td>#${booking.id}</td>
                    <td>${booking.user?.firstName} ${booking.user?.lastName}</td>
                    <td>${booking.show?.movie?.title || 'N/A'}</td>
                    <td>${new Date(booking.show?.showTime).toLocaleString()}</td>
                    <td>${booking.seats?.map(s => s.seatNumber).join(', ') || 'N/A'}</td>
                    <td>$${booking.totalPrice?.toFixed(2) || '0.00'}</td>
                    <td><span class="status-badge status-${booking.status?.toLowerCase()}">${booking.status}</span></td>
                    <td>
                        <div class="action-buttons">
                            ${booking.status === 'PENDING' ? `<button class="btn-small btn-confirm" onclick="confirmBooking(${booking.id})">Confirm</button>` : ''}
                            ${booking.status !== 'CANCELLED' ? `<button class="btn-small btn-cancel" onclick="cancelBooking(${booking.id})">Cancel</button>` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function confirmBooking(bookingId) {
            if (confirm('Confirm this booking?')) {
                try {
                    const response = await API.confirmBooking(bookingId);
                    if (response) {
                        alert('✅ Booking confirmed');
                        loadBookings();
                    }
                } catch (error) {
                    alert('❌ Error confirming booking');
                }
            }
        }

        async function cancelBooking(bookingId) {
            if (confirm('Cancel this booking?')) {
                try {
                    const response = await API.cancelBooking(bookingId);
                    if (response) {
                        alert('✅ Booking cancelled');
                        loadBookings();
                    }
                } catch (error) {
                    alert('❌ Error cancelling booking');
                }
            }
        }

        function filterBookings() {
            const status = document.getElementById('statusFilter').value;
            const filtered = status ? 
                allBookings.filter(b => b.status === status) : 
                allBookings;
            renderBookingsTable(filtered);
        }

        function clearFilters() {
            document.getElementById('statusFilter').value = '';
            renderBookingsTable(allBookings);
        }
    </script>
</body>
</html>

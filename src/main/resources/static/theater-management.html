<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🎬</text></svg>">
    <title>Theater Management - Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .management-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .management-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 1rem;
        }

        .management-header h1 {
            color: var(--primary-color);
            margin: 0;
        }

        .back-button {
            background-color: var(--primary-color);
            color: white;
            padding: 0.6rem 1.2rem;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .back-button:hover {
            background-color: #ff5252;
            transform: translateY(-2px);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .form-card {
            background-color: white;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            height: fit-content;
        }

        .form-card h2 {
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--dark-color);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--border-color);
            border-radius: 5px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background-color: #ff5252;
            transform: translateY(-2px);
        }

        .message {
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
        }

        .message.error {
            background-color: #ffebee;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            display: block;
        }

        .message.success {
            background-color: #e8f5e9;
            color: var(--success-color);
            border: 1px solid var(--success-color);
            display: block;
        }

        .list-card {
            background-color: white;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .list-card h2 {
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 1.5rem;
        }

        .theaters-table {
            width: 100%;
            border-collapse: collapse;
        }

        .theaters-table thead {
            background-color: var(--primary-color);
            color: white;
        }

        .theaters-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }

        .theaters-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .theaters-table tbody tr:hover {
            background-color: #f9f9f9;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn-small {
            padding: 0.5rem 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .btn-edit {
            background-color: #2196F3;
            color: white;
        }

        .btn-edit:hover {
            background-color: #1976D2;
        }

        .btn-delete {
            background-color: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background-color: #da190b;
        }

        .search-box {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .search-box input {
            flex: 1;
            padding: 0.8rem;
            border: 2px solid var(--border-color);
            border-radius: 5px;
            font-size: 1rem;
        }

        .search-box button {
            padding: 0.8rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .search-box button:hover {
            background-color: #ff5252;
        }

        @media (max-width: 900px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo"><a href="index.html" class="nav-link active">🎬 MovieTickets</a></div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="admin-dashboard.html" class="nav-link active">Admin</a></li>
                <li><a href="user-dashboard.html" class="nav-link">User</a></li>
            </ul>
        </div>
    </nav>

    <div id="notAuthenticated" style="display: none; max-width: 1200px; margin: 3rem auto; padding: 2rem; background-color: #ffebee; border-radius: 10px; text-align: center; color: var(--primary-color);">
        <h2>⛔ Access Denied</h2>
        <p>You need to be logged in as an admin to access this page.</p>
        <a href="login.html" style="color: var(--primary-color); font-weight: 600;">Go to Login</a>
    </div>

    <div id="managementContent" style="display: none;">
        <div class="management-container">
            <div class="management-header">
                <h1>🏢 Theater Management</h1>
                <a href="admin-dashboard.html" class="back-button">← Back to Dashboard</a>
            </div>

            <div class="content-grid">
                <!-- Add/Edit Theater Form -->
                <div class="form-card">
                    <h2 id="formTitle">➕ Add New Theater</h2>
                    <div id="theaterMessage" class="message"></div>
                    <form id="theaterForm">
                        <input type="hidden" id="theaterId">
                        
                        <div class="form-group">
                            <label for="name">Theater Name *</label>
                            <input type="text" id="name" name="name" required>
                        </div>

                        <div class="form-group">
                            <label for="city">City *</label>
                            <input type="text" id="city" name="city" required>
                        </div>

                        <div class="form-group">
                            <label for="address">Address *</label>
                            <textarea id="address" name="address" required></textarea>
                        </div>

                        <div class="form-group">
                            <label for="phone">Phone *</label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <button type="submit" class="btn-submit">Save Theater</button>
                        <button type="button" class="btn-submit" onclick="resetForm()" style="background-color: #666; margin-top: 0.5rem;">Clear Form</button>
                    </form>
                </div>

                <!-- Theaters List -->
                <div class="list-card">
                    <h2>🏢 All Theaters</h2>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search theaters...">
                        <button onclick="searchTheaters()">Search</button>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="theaters-table">
                            <thead>
                                <tr>
                                    <th>Theater Name</th>
                                    <th>City</th>
                                    <th>Phone</th>
                                    <th>Email</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="theatersContainer">
                                <tr><td colspan="5" style="text-align: center;">Loading theaters...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        // Check authentication
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));

            if (!user || user.role !== 'ADMIN') {
                document.getElementById('notAuthenticated').style.display = 'block';
                document.getElementById('managementContent').style.display = 'none';
                return;
            }

            document.getElementById('notAuthenticated').style.display = 'none';
            document.getElementById('managementContent').style.display = 'block';

            loadTheaters();
            document.getElementById('theaterForm').addEventListener('submit', saveTheater);
        });

        let allTheaters = [];

        async function loadTheaters() {
            try {
                allTheaters = await API.getTheaters();
                renderTheatersTable(allTheaters);
            } catch (error) {
                console.error('Error loading theaters:', error);
                showMessage('Error loading theaters', 'error');
            }
        }

        function renderTheatersTable(theaters) {
            const container = document.getElementById('theatersContainer');
            
            if (!theaters || theaters.length === 0) {
                container.innerHTML = '<tr><td colspan="5" style="text-align: center;">No theaters found</td></tr>';
                return;
            }

            container.innerHTML = theaters.map(theater => `
                <tr>
                    <td>${theater.name}</td>
                    <td>${theater.city}</td>
                    <td>${theater.phone}</td>
                    <td>${theater.email}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-small btn-edit" onclick="editTheater(${theater.id})">Edit</button>
                            <button class="btn-small btn-delete" onclick="deleteTheater(${theater.id})">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function saveTheater(e) {
            e.preventDefault();

            const theaterId = document.getElementById('theaterId').value;
            const name = document.getElementById('name').value;
            const city = document.getElementById('city').value;
            const address = document.getElementById('address').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;

            try {
                let response;
                if (theaterId) {
                    response = await fetch(`/api/v1/theaters/${theaterId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, city, address, phone, email })
                    });
                } else {
                    response = await fetch('/api/v1/theaters', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, city, address, phone, email })
                    });
                }

                if (response.ok) {
                    showMessage(theaterId ? '✅ Theater updated successfully!' : '✅ Theater created successfully!', 'success');
                    resetForm();
                    loadTheaters();
                } else {
                    const error = await response.json();
                    showMessage('❌ Error: ' + (error.message || 'Failed to save theater'), 'error');
                }
            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'error');
            }
        }

        function editTheater(theaterId) {
            const theater = allTheaters.find(t => t.id === theaterId);
            if (theater) {
                document.getElementById('theaterId').value = theater.id;
                document.getElementById('name').value = theater.name;
                document.getElementById('city').value = theater.city;
                document.getElementById('address').value = theater.address;
                document.getElementById('phone').value = theater.phone;
                document.getElementById('email').value = theater.email;
                document.getElementById('formTitle').textContent = '✏️ Edit Theater';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        async function deleteTheater(theaterId) {
            if (confirm('Are you sure you want to delete this theater?')) {
                try {
                    const response = await fetch(`/api/v1/theaters/${theaterId}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        showMessage('✅ Theater deleted successfully!', 'success');
                        loadTheaters();
                    } else {
                        showMessage('❌ Error deleting theater', 'error');
                    }
                } catch (error) {
                    showMessage('❌ Error: ' + error.message, 'error');
                }
            }
        }

        function resetForm() {
            document.getElementById('theaterForm').reset();
            document.getElementById('theaterId').value = '';
            document.getElementById('formTitle').textContent = '➕ Add New Theater';
        }

        function showMessage(message, type) {
            const messageDiv = document.getElementById('theaterMessage');
            messageDiv.textContent = message;
            messageDiv.className = 'message ' + type;
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 4000);
        }

        function searchTheaters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allTheaters.filter(theater => 
                theater.name.toLowerCase().includes(searchTerm) ||
                theater.city.toLowerCase().includes(searchTerm)
            );
            renderTheatersTable(filtered);
        }

        document.getElementById('searchInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchTheaters();
        });
    </script>
</body>
</html>
